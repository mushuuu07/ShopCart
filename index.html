<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopCart | Premium Shopping</title>

<style>
:root {
--sc-navy:#131921;
--sc-light-navy:#232f3e;
--sc-accent:#febd69;
--sc-orange:#f3a847;
--bg:#f3f4f6;
--text:#0f1111;
--radius:15px;
}

*{box-sizing:border-box;font-family:'Segoe UI',Arial;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);}

/* PAGE SYSTEM */
.page{display:none;min-height:80vh;padding:30px 20px;animation:slideUp .4s;}
.page.active{display:block;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* SPLASH */
#splashPage{
display:flex;align-items:center;justify-content:center;
height:100vh;background:linear-gradient(135deg,#131921,#232f3e);
color:white;flex-direction:column;
}

/* HEADER */
header{background:var(--sc-navy);color:white;position:sticky;top:0;z-index:1000;}
.nav-main{display:flex;align-items:center;padding:5px 20px;gap:15px;height:65px;}
.brand-logo{font-size:26px;font-weight:800;color:var(--sc-accent);cursor:pointer;}

.search-bar{flex-grow:1;display:flex;height:42px;}
.search-bar input{flex-grow:1;border:none;padding:0 15px;border-radius:var(--radius) 0 0 var(--radius);}
.search-btn{background:var(--sc-accent);width:50px;display:flex;justify-content:center;align-items:center;border-radius:0 var(--radius) var(--radius) 0;}

.nav-right{display:flex;gap:10px;}
.nav-item{cursor:pointer;padding:8px 12px;border-radius:var(--radius);}
.nav-item:hover{background:rgba(255,255,255,0.1);}

.nav-sub{background:var(--sc-light-navy);display:flex;gap:25px;padding:10px 25px;color:white;}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:25px;}
.p-card{background:white;padding:20px;border-radius:var(--radius);cursor:pointer;}
.p-card img{width:100%;height:200px;object-fit:cover;border-radius:10px;}

.form-box{background:white;padding:35px;border-radius:25px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
input{border-radius:10px;border:1px solid #ddd;padding:12px;width:100%;margin-bottom:10px;}

.btn{width:100%;padding:14px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;}
.btn-yellow{background:var(--sc-accent);}
.btn-orange{background:var(--sc-orange);color:white;}

footer{background:var(--sc-navy);color:white;text-align:center;padding:40px;margin-top:40px;}
</style>
</head>

<body>

<!-- SPLASH PAGE -->
<section id="splashPage" class="page active">
<h1 style="font-size:48px;color:#febd69;">ShopCart</h1>
<p style="opacity:.8;">Premium Digital Shopping</p>
</section>

<header>
<div class="nav-main">
<div class="brand-logo" onclick="showPage('homePage')">ShopCart</div>
</div>
</header>

<!-- HOME -->
<section id="homePage" class="page">
<h1>Welcome to ShopCart</h1>
<button class="btn btn-yellow" onclick="showPage('productsPage')">Browse Products</button>
</section>

<!-- PRODUCTS -->
<section id="productsPage" class="page">
<h2>Products</h2>
<div class="product-grid" id="grid"></div>
</section>

<!-- ADDRESS PAGE -->
<section id="addressPage" class="page">
<div class="form-box" style="max-width:600px;margin:auto;">
<h2>Delivery Address</h2>

<input type="text" id="addr-name" placeholder="Full Name">
<input type="text" id="addr-phone" placeholder="Phone">
<input type="text" id="addr-street" placeholder="Street">
<input type="text" id="addr-city" placeholder="City">
<input type="text" id="addr-state" placeholder="State">
<input type="text" id="addr-pin" placeholder="Pincode">

<button class="btn btn-yellow" onclick="goToPayment()">Continue to Payment</button>
</div>
</section>

<!-- PAYMENT PAGE -->
<section id="paymentPage" class="page">
<div class="form-box" style="max-width:500px;margin:auto;">
<h2>Payment</h2>

<input type="text" id="card-name" placeholder="Card Holder Name">
<input type="text" id="card-number" placeholder="Card Number">
<input type="text" placeholder="MM/YY">
<input type="text" placeholder="CVV">

<button class="btn btn-orange" onclick="finalOrder()">Pay & Place Order</button>
</div>
</section>

<footer>© 2026 ShopCart</footer>

<script>
/* SPLASH AUTO REDIRECT */
setTimeout(()=>{showPage('homePage')},2500);

const products=[
{id:1,name:"Phone",price:20000,img:"https://via.placeholder.com/300"},
{id:2,name:"Laptop",price:60000,img:"https://via.placeholder.com/300"}
];

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PRODUCTS */
const grid=document.getElementById('grid');
products.forEach(p=>{
grid.innerHTML+=`
<div class="p-card" onclick="goToAddress()">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
</div>`;
});

function goToAddress(){
showPage('addressPage');
}

function goToPayment(){
if(!document.getElementById('addr-street').value) return alert("Fill address!");
showPage('paymentPage');
}

function finalOrder(){
if(!document.getElementById('card-number').value) return alert("Enter card!");
alert("Payment Successful 🎉");
showPage('homePage');
}
</script>

</body>
</html>

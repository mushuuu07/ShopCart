<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - Checkout Flow</title>
    <style>
        :root {
            --amz-blue: #131921; --amz-light: #232f3e; --amz-yellow: #febd69;
            --amz-orange: #f3a847; --bg: #eaeded; --text: #0f1111; --link: #007185;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- PERSISTENT HEADER --- */
        header { background: var(--amz-blue); color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-main { display: flex; align-items: center; padding: 5px 20px; gap: 15px; height: 60px; }
        .logo { font-size: 22px; font-weight: bold; cursor: pointer; }
        .search-bar { flex-grow: 1; display: flex; height: 40px; }
        .search-bar input { flex-grow: 1; border: none; padding: 0 15px; border-radius: 4px 0 0 4px; outline: none; }
        .search-icon { background: var(--amz-yellow); width: 45px; display: flex; justify-content: center; align-items: center; border-radius: 0 4px 4px 0; cursor: pointer; }
        .nav-right { display: flex; gap: 15px; }
        .nav-item { cursor: pointer; padding: 5px 10px; border: 1px solid transparent; }
        .nav-item span { display: block; font-size: 12px; color: #ccc; }

        /* --- PAGE CONTROL --- */
        .page { display: none; min-height: 80vh; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PRODUCT GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 15px; cursor: pointer; border: 1px solid #ddd; }
        .card img { width: 100%; height: 200px; object-fit: contain; }

        /* --- CHECKOUT PAGE STYLES --- */
        .checkout-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1100px; margin: auto; }
        .checkout-step { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; }
        .checkout-step h2 { font-size: 18px; margin-bottom: 15px; color: #c45500; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #888; border-radius: 3px; }
        
        .order-summary { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 4px; height: fit-content; position: sticky; top: 80px; }
        .order-summary h3 { margin-bottom: 15px; font-size: 18px; }

        /* --- CART SIDEBAR --- */
        .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .cart-sidebar { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; z-index: 2000; padding: 20px; transition: 0.3s; }
        .cart-sidebar.open { right: 0; }

        .btn { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #a88734; cursor: pointer; font-weight: bold; }
        .btn-yellow { background: #ffd814; margin-top: 10px; }
        .btn-orange { background: #ffa41c; }

        footer { background: var(--amz-light); color: white; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="nav-main">
        <div class="logo" onclick="showPage('homePage')">amazon.in</div>
        <div class="search-bar"><input type="text"><div class="search-icon">🔍</div></div>
        <div class="nav-right">
            <div class="nav-item" onclick="showPage('accountPage')"><span id="userGreet">Hello, Sign in</span><strong>Account</strong></div>
            <div class="nav-item" onclick="openCart()"><span>Shopping</span><strong>🛒 Cart (<span id="cartCount">0</span>)</strong></div>
        </div>
    </div>
</header>

<section id="homePage" class="page active">
    <div style="height:250px; background: url('https://images-eu.ssl-images-amazon.com/images/G/31/img22/WES/July/MSO/PC_Hero_3000x1200_1._CB632151608_.jpg') center/cover; margin-bottom: 20px;"></div>
    <div class="grid" id="mainGrid"></div>
</section>

<section id="accountPage" class="page">
    <div style="max-width:350px; margin:auto; background:white; padding:30px; border:1px solid #ddd;">
        <h2>Sign-In</h2><br>
        <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn btn-yellow" onclick="handleLogin()">Continue</button>
    </div>
</section>

<section id="descPage" class="page">
    <div id="productDetail" style="max-width:1000px; margin:auto; background:white; padding:30px; display:flex; gap:30px;"></div>
</section>

<section id="checkoutPage" class="page">
    <div class="checkout-layout">
        <div>
            <div class="checkout-step">
                <h2>1. Delivery Address</h2>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="shipName">
                </div>
                <div class="input-group">
                    <label>Flat, House no., Building</label>
                    <input type="text" id="shipAddr">
                </div>
                <div class="input-group">
                    <label>Town/City</label>
                    <input type="text" id="shipCity">
                </div>
            </div>

            <div class="checkout-step">
                <h2>2. Payment Method</h2>
                <div class="input-group">
                    <input type="radio" name="pay" checked> Cash on Delivery (COD)
                </div>
                <div class="input-group">
                    <input type="radio" name="pay"> UPI / Credit / Debit Card
                </div>
            </div>
        </div>

        <div class="order-summary">
            <h3>Order Summary</h3>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>Items:</span><span id="sumItems">₹0</span>
            </div>
            <div style="display:flex; justify-content:space-between; color:red; font-size:18px; font-weight:bold; border-top:1px solid #eee; padding-top:10px;">
                <span>Order Total:</span><span id="sumTotal">₹0</span>
            </div>
            <br>
            <button class="btn btn-orange" onclick="placeOrder()">Place Your Order</button>
        </div>
    </div>
</section>

<div class="cart-overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="sidebar">
    <h3>Shopping Cart</h3><br>
    <div id="cartList" style="height:70%; overflow-y:auto;"></div>
    <div style="border-top:1px solid #ddd; padding-top:15px;">
        <h4>Subtotal: ₹<span id="cartSubtotal">0</span></h4>
        <button class="btn btn-yellow" onclick="goToCheckout()">Proceed to Buy</button>
    </div>
</div>

<footer><p>© 2026 Amazon Clone</p></footer>

<script>
    const products = [
        { id: 1, name: 'iPhone 15 Pro', price: 129900, img: 'https://m.media-amazon.com/images/I/81Sig6bi1GL._AC_UY327_FMwebp_QL65_.jpg' },
        { id: 2, name: 'Sony XM5 Headphones', price: 29990, img: 'https://m.media-amazon.com/images/I/51aB7hrGRRL._AC_UY327_FMwebp_QL65_.jpg' }
    ];

    let user = JSON.parse(localStorage.getItem('amz_user'));
    let cart = [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function handleLogin() {
        user = { email: document.getElementById('loginEmail').value };
        localStorage.setItem('amz_user', JSON.stringify(user));
        document.getElementById('userGreet').innerText = "Hello, " + user.email.split('@')[0];
        showPage('homePage');
    }

    function renderMain() {
        const grid = document.getElementById('mainGrid');
        products.forEach(p => {
            grid.innerHTML += `<div class="card" onclick="openProduct(${p.id})"><img src="${p.img}"><h4>${p.name}</h4><p>₹${p.price.toLocaleString()}</p></div>`;
        });
    }

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('productDetail').innerHTML = `
            <img src="${p.img}" style="width:300px;">
            <div>
                <h1>${p.name}</h1><br>
                <p>₹${p.price.toLocaleString()}</p><br>
                <button class="btn btn-yellow" onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `;
        showPage('descPage');
    }

    function addToCart(id) {
        if(!user) return showPage('accountPage');
        cart.push(products.find(x => x.id === id));
        updateCart();
        alert("Added to cart!");
    }

    function updateCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = ''; let total = 0;
        cart.forEach((item, i) => {
            total += item.price;
            list.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px;"><img src="${item.img}" width="50"><div><p>${item.name}</p><b>₹${item.price}</b></div></div>`;
        });
        document.getElementById('cartSubtotal').innerText = total.toLocaleString();
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('sumItems').innerText = '₹' + total.toLocaleString();
        document.getElementById('sumTotal').innerText = '₹' + total.toLocaleString();
    }

    function goToCheckout() {
        if(!cart.length) return alert("Cart is empty");
        closeCart();
        showPage('checkoutPage');
    }

    function placeOrder() {
        if(!document.getElementById('shipName').value) return alert("Enter shipping name");
        alert("Thank you! Order placed successfully.");
        cart = []; updateCart();
        showPage('homePage');
    }

    function openCart() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; }
    function closeCart() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; }

    renderMain();
    if(user) document.getElementById('userGreet').innerText = "Hello, " + user.email.split('@')[0];
</script>
</body>
</html>

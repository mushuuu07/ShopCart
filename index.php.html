<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopCart</title>

<style>
:root{
  --bg:#FAF0E6;
  --card:#fff;
  --text:#222;
  --primary:#8B5A2B;
  --accent:#D2B48C;
}
body.dark{
  --bg:#3E2723;
  --card:#4E342E;
  --text:#f4f4f4;
}
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0;transition:.3s}
body{background:var(--bg);color:var(--text)}

nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;background:var(--primary);color:white
}
nav ul{display:flex;gap:15px;list-style:none}
nav a{color:white;font-weight:bold;text-decoration:none;cursor:pointer}

button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.cart-btn,.theme-btn{background:var(--accent)}

section{display:none;padding:20px}
section.active{display:block}

.hero{padding:40px;background:var(--accent);border-radius:12px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}

.card{
  background:var(--card);padding:15px;border-radius:12px;
  box-shadow:0 4px 8px rgba(0,0,0,.2);text-align:center
}
.card img{width:100%;height:150px;object-fit:contain}

.cart{
  position:fixed;right:-340px;bottom:20px;width:320px;
  background:var(--card);padding:15px;border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.3)
}
.cart.open{right:20px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}
.modal-content{
  background:var(--card);width:320px;margin:60px auto;
  padding:15px;border-radius:10px
}
input,select{width:100%;padding:8px;margin-bottom:8px}

.history{background:var(--card);padding:15px;border-radius:10px}
</style>
</head>

<body>

<nav>
  <strong>🛒 ShopCart</strong>
  <ul>
    <li><a onclick="showPage('home')">Home</a></li>
    <li><a onclick="showPage('products')">Products</a></li>
    <li><a onclick="showPage('about')">About</a></li>
  </ul>
  <div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="cart-btn" onclick="toggleCart()">Cart</button>
    <button class="cart-btn" onclick="showOrders()">Orders</button>
  </div>
</nav>

<section id="home" class="active">
  <div class="hero">
    <h1>Welcome to ShopCart</h1>
    <p>Modern shopping with smooth experience</p>
  </div>
</section>

<section id="products">
  <h2>Products</h2>
  <div class="products" id="productList"></div>
</section>

<section id="about">
  <h2>About</h2>
  <p>This is a demo e-commerce website using HTML, CSS, JS & Supabase.</p>
</section>

<section id="orders">
  <h2>Your Orders</h2>
  <div class="history" id="orderList"></div>
</section>

<div class="cart" id="cartBox">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <strong>Total ₹<span id="total">0</span></strong><br><br>
  <button onclick="openCheckout()">Checkout</button>
</div>

<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>Checkout</h3>
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  "https://vzlbjlalroksmbewkzhc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bGJqbGFscm9rc21iZXdremhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NTAxNzQsImV4cCI6MjA4MTUyNjE3NH0.Dw6FGsS297zOAJagK4n8od5DKK-ZhkTtb_oXtABNuqk"
);
</script>

<script>
let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];

const products=[
 {name:"Smart Watch",price:2999,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"},
 {name:"Laptop",price:54999,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
 {name:"Headphones",price:1999,img:"https://images.unsplash.com/photo-1519677100203-a0e668c92439"},
 {name:"Camera",price:25999,img:"https://images.unsplash.com/photo-1519183071298-a2962d0a3d7b"}
];

function showPage(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function toggleTheme(){document.body.classList.toggle("dark")}
function toggleCart(){document.getElementById("cartBox").classList.toggle("open")}

function renderProducts(){
 const list=document.getElementById("productList");
 list.innerHTML="";
 products.forEach(p=>{
  list.innerHTML+=`
   <div class="card">
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <p>₹${p.price}</p>
    <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
   </div>`;
 });
}

function addToCart(p){
 let f=cart.find(i=>i.name===p.name);
 f?f.qty++:cart.push({...p,qty:1});
 renderCart();
}

function renderCart(){
 const ul=document.getElementById("cartItems");
 ul.innerHTML="";
 let total=0;
 cart.forEach(i=>{
  total+=i.price*i.qty;
  ul.innerHTML+=`<li>${i.name} x${i.qty}</li>`;
 });
 document.getElementById("total").innerText=total;
}

function openCheckout(){document.getElementById("checkoutModal").style.display="block"}

async function placeOrder(){
 const order={
  name:document.getElementById("name").value,
  email:document.getElementById("email").value,
  phone:document.getElementById("phone").value,
  address:document.getElementById("address").value,
  items:cart,
  created_at:new Date()
 };
 if(!order.name||!order.email){alert("Fill details");return;}

 const {error}=await supabase.from("orders").insert([order]);
 if(error){alert("Error");console.log(error);return;}

 orders.push(order);
 localStorage.setItem("orders",JSON.stringify(orders));
 cart=[];
 renderCart();
 document.getElementById("checkoutModal").style.display="none";
 alert("Order placed!");
}

function showOrders(){
 showPage("orders");
 const d=document.getElementById("orderList");
 d.innerHTML=orders.length?orders.map(o=>`<p>${o.name} - ${o.items.length} items</p>`).join(""):"No orders";
}

renderProducts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopCart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;font-family:Arial;background:#f4f4f4;
}
nav{
  background:#111;color:#fff;padding:12px;
  display:flex;justify-content:space-between;align-items:center;
}
nav a{
  color:#fff;margin:0 10px;text-decoration:none;font-weight:bold;
}
nav button{padding:6px 12px;border:none;cursor:pointer}

.container{padding:20px}

.filters{
  display:flex;gap:10px;margin-bottom:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#fff;padding:15px;border-radius:8px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
  text-align:center;
}
.card img{width:100%;height:150px;object-fit:cover}
.card button{
  background:#111;color:#fff;padding:8px 12px;
  border:none;border-radius:5px;cursor:pointer;
}

.cart{
  position:fixed;right:0;top:0;width:300px;height:100%;
  background:#fff;box-shadow:-4px 0 10px rgba(0,0,0,.2);
  padding:15px;display:none;
}

.cart h3{text-align:center}

.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
}
.popup-box{
  background:#fff;padding:20px;border-radius:8px;width:300px;
}
.popup-box input{
  width:100%;padding:8px;margin:8px 0;
}
.popup-box button{
  width:100%;padding:8px;background:#111;color:#fff;border:none;
}
</style>
</head>

<body>

<nav>
  <div><b>ShopCart</b></div>
  <div>
    <a href="#" onclick="showProducts()">Products</a>
    <a href="#" onclick="toggleCart()">Cart</a>
    <button onclick="openLogin()">Login</button>
  </div>
</nav>

<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <select id="categoryFilter" onchange="renderProducts()">
      <option value="all">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="fashion">Fashion</option>
      <option value="accessories">Accessories</option>
    </select>

    <select id="priceFilter" onchange="renderProducts()">
      <option value="all">All Prices</option>
      <option value="low">Below ₹1000</option>
      <option value="high">Above ₹1000</option>
    </select>
  </div>

  <!-- PRODUCTS -->
  <div class="products" id="productList"></div>
</div>

<!-- CART -->
<div class="cart" id="cartBox">
  <h3>Your Cart</h3>
  <ul id="cartItems"></ul>
  <b>Total: ₹<span id="total">0</span></b>
</div>

<!-- LOGIN POPUP -->
<div class="popup" id="loginPopup">
  <div class="popup-box">
    <h3>Login Required</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
let loggedIn = false;
let cart = [];
let total = 0;

/* PRODUCTS DATA */
const products = [
  {name:"Smartphone",price:12000,cat:"electronics",img:"https://via.placeholder.com/200?text=Phone"},
  {name:"Laptop",price:45000,cat:"electronics",img:"https://via.placeholder.com/200?text=Laptop"},
  {name:"Headphones",price:900,cat:"electronics",img:"https://via.placeholder.com/200?text=Headphones"},
  {name:"T-Shirt",price:500,cat:"fashion",img:"https://via.placeholder.com/200?text=T-Shirt"},
  {name:"Jeans",price:1200,cat:"fashion",img:"https://via.placeholder.com/200?text=Jeans"},
  {name:"Shoes",price:2200,cat:"fashion",img:"https://via.placeholder.com/200?text=Shoes"},
  {name:"Watch",price:1500,cat:"accessories",img:"https://via.placeholder.com/200?text=Watch"},
  {name:"Backpack",price:800,cat:"accessories",img:"https://via.placeholder.com/200?text=Bag"},
  {name:"Sunglasses",price:700,cat:"accessories",img:"https://via.placeholder.com/200?text=Glasses"}
];

/* RENDER PRODUCTS */
function renderProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  const cat = categoryFilter.value;
  const price = priceFilter.value;

  products.filter(p=>{
    if(cat!=="all" && p.cat!==cat) return false;
    if(price==="low" && p.price>1000) return false;
    if(price==="high" && p.price<=1000) return false;
    return true;
  }).forEach(p=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
    `;
    list.appendChild(d);
  });
}

/* ADD TO CART */
function addToCart(name,price){
  if(!loggedIn){
    openLogin();
    return;
  }
  cart.push({name,price});
  total+=price;
  updateCart();
}

/* CART UI */
function updateCart(){
  const ul=document.getElementById("cartItems");
  ul.innerHTML="";
  cart.forEach(i=>{
    const li=document.createElement("li");
    li.textContent=`${i.name} - ₹${i.price}`;
    ul.appendChild(li);
  });
  document.getElementById("total").textContent=total;
}

/* LOGIN */
function openLogin(){ document.getElementById("loginPopup").style.display="flex"; }
function login(){
  loggedIn=true;
  document.getElementById("loginPopup").style.display="none";
  alert("Login successful!");
}

/* CART TOGGLE */
function toggleCart(){
  const c=document.getElementById("cartBox");
  c.style.display=c.style.display==="block"?"none":"block";
}

/* INIT */
renderProducts();
</script>

</body>
</html>

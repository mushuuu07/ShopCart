<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopCart – Categories & Filters</title>

<style>
:root{
  --bg:#FAF0E6; --card:#fff; --text:#111;
  --nav:#6d3b1e; --primary:#8b4513; --accent:#d2b48c;
}
body.dark{
  --bg:#2b1b14; --card:#3b251b; --text:#f4f4f4;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:var(--bg);color:var(--text)}

nav{
  background:var(--nav);color:#fff;
  padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center
}
nav ul{display:flex;gap:15px;list-style:none}
nav a{color:#fff;font-weight:bold;text-decoration:none;cursor:pointer}
button{padding:6px 12px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}

section{display:none;padding:20px}
section.active{display:block}

.hero{
  background:var(--accent);padding:40px;border-radius:14px;
  text-align:center
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;margin-top:15px
}
.card{
  background:var(--card);padding:15px;
  border-radius:12px;text-align:center
}
.card img{width:100%;height:140px;object-fit:contain}
.card button{margin-top:8px;background:var(--primary);color:#fff}

.filters{
  display:flex;flex-wrap:wrap;gap:10px;
  background:var(--card);padding:12px;border-radius:10px
}
input,select{
  padding:8px;border-radius:6px;border:1px solid #ccc
}

.cart{
  position:fixed;right:-320px;bottom:20px;width:300px;
  background:var(--card);padding:15px;border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  transition:.3s
}
.cart.open{right:20px}

.order-box{
  background:var(--card);padding:12px;
  border-radius:10px;margin-bottom:10px
}
</style>
</head>

<body>

<nav>
  <b>🛒 ShopCart</b>
  <ul>
    <li><a onclick="go('home')">Home</a></li>
    <li><a onclick="go('products')">Products</a></li>
    <li><a onclick="go('about')">About</a></li>
    <li><a onclick="go('orders')">Orders</a></li>
  </ul>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="toggleCart()">Cart</button>
    <button id="loginBtn" onclick="go('login')">Login</button>
    <button id="logoutBtn" onclick="logout()" style="display:none">Logout</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1>Welcome to ShopCart</h1>
    <p>Browse products using categories & smart filters</p>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Products</h2>

  <div class="filters">
    <input type="text" id="search" placeholder="Search product">
    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Accessories">Accessories</option>
      <option value="Home">Home</option>
      <option value="Fashion">Fashion</option>
    </select>
    <input type="number" id="minPrice" placeholder="Min ₹">
    <input type="number" id="maxPrice" placeholder="Max ₹">
    <button onclick="applyFilters()">Apply</button>
  </div>

  <div class="products" id="productList"></div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <p>This is a complete ecommerce demo with category & filter system.</p>
</section>

<!-- LOGIN -->
<section id="login">
  <div class="order-box" style="max-width:360px;margin:auto">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>New user? <a onclick="go('register')">Register</a></p>
  </div>
</section>

<!-- REGISTER -->
<section id="register">
  <div class="order-box" style="max-width:360px;margin:auto">
    <h2>Register</h2>
    <input id="regName" placeholder="Full Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <input id="regConfirm" type="password" placeholder="Confirm Password">
    <button onclick="register()">Register</button>
  </div>
</section>

<!-- ORDERS -->
<section id="orders">
  <h2>Your Orders</h2>
  <div id="orderList"></div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <b>Total ₹<span id="total">0</span></b><br><br>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
/* NAV */
function go(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  cartBox.classList.remove("open");
}

/* THEME */
function toggleTheme(){document.body.classList.toggle("dark")}

/* DATA */
let users=JSON.parse(localStorage.users||"[]");
let currentUser=JSON.parse(localStorage.currentUser||"null");
let orders=JSON.parse(localStorage.orders||"[]");
let cart=[];

/* AUTH UI */
function updateAuth(){
  loginBtn.style.display=currentUser?"none":"inline";
  logoutBtn.style.display=currentUser?"inline":"none";
}
updateAuth();

/* PRODUCTS */
const productList=document.getElementById("productList");

const products=[
  {name:"Smartphone",price:15000,cat:"Electronics"},
  {name:"Laptop",price:55000,cat:"Electronics"},
  {name:"Headphones",price:2000,cat:"Accessories"},
  {name:"Smart Watch",price:3000,cat:"Accessories"},
  {name:"Mixer Grinder",price:4000,cat:"Home"},
  {name:"Air Fryer",price:6000,cat:"Home"},
  {name:"Backpack",price:2500,cat:"Fashion"},
  {name:"Shoes",price:3500,cat:"Fashion"},
];

for(let i=1;i<=32;i++){
  products.push({
    name:"Product "+i,
    price:500+i*100,
    cat:["Electronics","Accessories","Home","Fashion"][i%4]
  });
}

function renderProducts(list){
  productList.innerHTML="";
  list.forEach(p=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <img src="https://via.placeholder.com/200?text=${p.name}">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <small>${p.cat}</small><br>
      <button onclick='addToCart("${p.name}",${p.price})'>Add</button>
    `;
    productList.appendChild(d);
  });
}
renderProducts(products);

/* FILTERS */
function applyFilters(){
  const search=document.getElementById("search").value.toLowerCase();
  const cat=document.getElementById("categoryFilter").value;
  const min=document.getElementById("minPrice").value||0;
  const max=document.getElementById("maxPrice").value||Infinity;

  const filtered=products.filter(p=>{
    return (
      p.name.toLowerCase().includes(search) &&
      (cat==="all"||p.cat===cat) &&
      p.price>=min && p.price<=max
    );
  });
  renderProducts(filtered);
}

/* CART */
const cartBox=document.getElementById("cart");
function toggleCart(){cartBox.classList.toggle("open")}
function addToCart(name,price){
  cart.push({name,price});
  renderCart();
}
function renderCart(){
  cartItems.innerHTML="";
  let total=0;
  cart.forEach(i=>{
    total+=i.price;
    const li=document.createElement("li");
    li.textContent=i.name+" - ₹"+i.price;
    cartItems.appendChild(li);
  });
  document.getElementById("total").textContent=total;
}

/* AUTH */
function register(){
  if(regPass.value!==regConfirm.value){alert("Passwords mismatch");return;}
  users.push({name:regName.value,email:regEmail.value,pass:regPass.value});
  localStorage.users=JSON.stringify(users);
  alert("Registered successfully");
  go("login");
}
function login(){
  const u=users.find(x=>x.email===loginEmail.value && x.pass===loginPass.value);
  if(!u){alert("Invalid login");return;}
  currentUser=u;
  localStorage.currentUser=JSON.stringify(u);
  updateAuth();
  go("home");
}
function logout(){
  currentUser=null;
  localStorage.removeItem("currentUser");
  updateAuth();
  go("login");
}

/* CHECKOUT */
function checkout(){
  if(!currentUser){alert("Login required");go("login");return;}
  if(!cart.length){alert("Cart empty");return;}
  orders.push({user:currentUser.email,items:cart,date:new Date().toLocaleString()});
  localStorage.orders=JSON.stringify(orders);
  cart=[];
  renderCart();
  alert("Order placed successfully!");
}

/* ORDERS */
function loadOrders(){
  orderList.innerHTML="";
  orders.filter(o=>currentUser && o.user===currentUser.email)
    .forEach(o=>{
      const d=document.createElement("div");
      d.className="order-box";
      d.innerHTML=`<b>${o.date}</b><br>${o.items.map(i=>i.name).join(", ")}`;
      orderList.appendChild(d);
    });
}
setInterval(loadOrders,1000);
</script>

</body>
</html>

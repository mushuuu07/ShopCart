<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopCart</title>

<style>
:root{
  --bg:#FAF0E6;
  --card:#fff;
  --text:#111;
  --nav:#A0522D;
  --primary:#A0522D;
  --accent:#D2B48C;
}
body.dark{
  --bg:#3E2723;
  --card:#4E342E;
  --text:#f4f4f4;
}
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0}
body{background:var(--bg);color:var(--text)}

nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 25px;background:var(--nav);color:#fff
}
nav ul{display:flex;gap:15px;list-style:none}
nav ul li a{color:#fff;font-weight:bold;cursor:pointer;text-decoration:none}
button{padding:6px 12px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}

section{display:none;padding:20px}
section.active{display:block}

.hero{text-align:center;background:var(--accent);padding:40px;border-radius:14px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:var(--card);padding:15px;border-radius:12px;text-align:center}
.card img{width:100%;height:140px;object-fit:contain}

.cart{
  position:fixed;right:-320px;bottom:20px;width:300px;
  background:var(--card);padding:15px;border-radius:12px;
  transition:.3s
}
.cart.open{right:20px}

.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)
}
.modal-content{
  background:var(--card);width:350px;margin:80px auto;
  padding:20px;border-radius:12px
}
input{width:100%;padding:8px;margin-bottom:10px}
</style>
</head>

<body>

<nav>
  <div><b>🛒 ShopCart</b></div>
  <ul>
    <li><a onclick="showPage('home')">Home</a></li>
    <li><a onclick="showPage('products')">Products</a></li>
    <li><a onclick="showPage('about')">About</a></li>
  </ul>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="toggleCart()">Cart</button>
    <button id="loginBtn" onclick="showPage('login')">Login</button>
    <button id="logoutBtn" onclick="logout()" style="display:none">Logout</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1>Welcome to ShopCart</h1>
    <p>Simple ecommerce demo with login system</p>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Products</h2>
  <div class="products" id="productList"></div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <p>This is a demo ecommerce website built using HTML, CSS & JavaScript.</p>
</section>

<!-- LOGIN -->
<section id="login">
  <div class="modal-content">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>New user? <a onclick="showPage('register')">Register</a></p>
  </div>
</section>

<!-- REGISTER -->
<section id="register">
  <div class="modal-content">
    <h2>Register</h2>
    <input id="regName" placeholder="Full Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <input id="regConfirm" type="password" placeholder="Confirm Password">
    <button onclick="register()">Register</button>
    <p>Already have account? <a onclick="showPage('login')">Login</a></p>
  </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
/* THEME */
function toggleTheme(){document.body.classList.toggle('dark')}

/* NAV */
function showPage(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('cart').classList.remove('open');
}

/* PRODUCTS */
const products=[
  {name:"Smart Watch",price:2999,img:"smart.webp"},
  {name:"Headphones",price:1999,img:"https://via.placeholder.com/200"},
  {name:"Laptop",price:54999,img:"https://via.placeholder.com/200"},
  {name:"Mobile",price:18999,img:"https://via.placeholder.com/200"}
];
const cart=[];
const productList=document.getElementById('productList');

products.forEach(p=>{
  const d=document.createElement('div');
  d.className="card";
  d.innerHTML=`<img src="${p.img}">
               <h4>${p.name}</h4>
               <p>₹${p.price}</p>
               <button onclick='addToCart("${p.name}")'>Add</button>`;
  productList.appendChild(d);
});

/* CART */
function toggleCart(){document.getElementById('cart').classList.toggle('open')}
function addToCart(name){
  cart.push(name);
  renderCart();
}
function renderCart(){
  cartItems.innerHTML="";
  cart.forEach(i=>{
    const li=document.createElement('li');
    li.textContent=i;
    cartItems.appendChild(li);
  });
}

/* AUTH */
let users=JSON.parse(localStorage.users||"[]");
let currentUser=JSON.parse(localStorage.currentUser||"null");

function updateAuth(){
  loginBtn.style.display=currentUser?"none":"inline";
  logoutBtn.style.display=currentUser?"inline":"none";
}
updateAuth();

function register(){
  if(regPass.value!==regConfirm.value){alert("Passwords mismatch");return;}
  users.push({name:regName.value,email:regEmail.value,pass:regPass.value});
  localStorage.users=JSON.stringify(users);
  alert("Registered successfully");
  showPage('login');
}

function login(){
  const u=users.find(x=>x.email===loginEmail.value && x.pass===loginPass.value);
  if(!u){alert("Invalid login");return;}
  currentUser=u;
  localStorage.currentUser=JSON.stringify(u);
  updateAuth();
  showPage('home');
}

function logout(){
  currentUser=null;
  localStorage.removeItem('currentUser');
  updateAuth();
  showPage('login');
}

function checkout(){
  if(!currentUser){alert("Login required");showPage('login');return;}
  alert("Order placed successfully!");
  cart.length=0;
  renderCart();
}
</script>

</body>
</html>

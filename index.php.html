<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone - Shop Online</title>
    <style>
        :root {
            --amazon-blue: #131921;
            --amazon-light-blue: #232f3e;
            --amazon-yellow: #febd69;
            --amazon-orange: #f3a847;
            --bg-gray: #eaeded;
            --text: #0f1111;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-gray); color: var(--text); }

        /* --- NAVIGATION --- */
        header { background: var(--amazon-blue); color: white; }
        
        .nav-top {
            display: flex;
            align-items: center;
            padding: 5px 20px;
            gap: 15px;
        }

        .logo { font-size: 22px; font-weight: bold; cursor: pointer; color: white; text-decoration: none; padding: 10px; border: 1px solid transparent; }
        .logo:hover { border: 1px solid white; }

        .search-container {
            flex-grow: 1;
            display: flex;
            height: 40px;
        }

        .search-container input {
            flex-grow: 1;
            border: none;
            padding: 0 10px;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-btn {
            background: var(--amazon-yellow);
            width: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        .nav-right { display: flex; gap: 20px; font-size: 14px; }
        .nav-link { cursor: pointer; padding: 10px; border: 1px solid transparent; }
        .nav-link:hover { border: 1px solid white; }
        .nav-link span { display: block; font-size: 12px; color: #ccc; }

        .nav-bottom {
            background: var(--amazon-light-blue);
            display: flex;
            gap: 15px;
            padding: 8px 20px;
            font-size: 14px;
        }

        /* --- HERO --- */
        .hero-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg-gray)), url('https://images-eu.ssl-images-amazon.com/images/G/31/img22/WES/July/MSO/PC_Hero_3000x1200_1._CB632151608_.jpg');
            background-size: cover;
            background-position: center;
        }

        /* --- PRODUCT GRID --- */
        .main-container { padding: 0 20px; margin-top: -100px; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .product-card h3 { font-size: 16px; margin-bottom: 8px; height: 40px; overflow: hidden; }
        .price { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .price span { font-size: 12px; vertical-align: top; }

        .prime-img { width: 50px !important; height: auto !important; margin: 5px 0 !important; }

        .add-btn {
            background: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            padding: 8px;
            cursor: pointer;
            margin-top: auto;
        }
        .add-btn:hover { background: #f7ca00; }

        /* --- CART SIDEBAR --- */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 2000;
            padding: 20px;
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

        /* --- MODAL --- */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:3000; }
        .modal-content { background:white; width:400px; margin:50px auto; padding:30px; border-radius:8px; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #067D62;
            color: white;
            padding: 15px 25px;
            border-radius: 4px;
            display: none;
            z-index: 5000;
        }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <div class="logo" onclick="showPage('home')">amazon.in</div>
        <div class="nav-link"><span>Deliver to</span><strong>India</strong></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Amazon" onkeyup="searchProducts()">
            <div class="search-btn">🔍</div>
        </div>

        <div class="nav-right">
            <div class="nav-link" onclick="showPage('orderHistory')"><span>Returns</span><strong>& Orders</strong></div>
            <div class="nav-link" onclick="toggleCart()"><span>Your</span><strong>🛒 Cart (<span id="count">0</span>)</strong></div>
        </div>
    </div>
    <div class="nav-bottom">
        <span>All</span>
        <span>Fresh</span>
        <span>Amazon miniTV</span>
        <span>Sell</span>
        <span>Best Sellers</span>
        <span>Mobiles</span>
    </div>
</header>

<section id="home" class="page">
    <div class="hero-banner"></div>
    <div class="main-container">
        <div class="products-grid" id="allProducts"></div>
    </div>
</section>

<section id="orderHistory" class="page" style="display:none; padding: 40px;">
    <h2>Your Orders</h2>
    <hr style="margin: 20px 0;">
    <div id="historyList"></div>
</section>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>Shopping Cart</h3>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
    </div>
    <div id="cartItems" style="max-height: 70%; overflow-y: auto;"></div>
    <div style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px;">
        <h4>Subtotal: ₹<span id="total">0</span></h4>
        <button class="add-btn" style="width:100%; margin-top:15px;" onclick="openCheckout()">Proceed to Buy</button>
    </div>
</div>

<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <h2>Shipping Address</h2>
        <br>
        <input id="fullName" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="address" placeholder="Flat, House no, Building" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="city" placeholder="Town/City" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="payment" style="width:100%; padding:10px; margin-bottom:20px;">
            <option value="cod">Cash on Delivery</option>
            <option value="upi">UPI / Net Banking</option>
        </select>
        <button class="add-btn" style="width:100%" onclick="placeOrder()">Use this address</button>
        <button onclick="closeCheckout()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="toast" id="toast">Added to Cart!</div>

<script>
    const products = [
        { name: 'Apple iPhone 15 (128 GB) - Black', price: 72999, img: 'https://m.media-amazon.com/images/I/71657UrqZfL._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Samsung Galaxy M34 5G (Prism Silver)', price: 16999, img: 'https://m.media-amazon.com/images/I/91ItZze1qOL._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Sony WH-1000XM5 Wireless Headphones', price: 29990, img: 'https://m.media-amazon.com/images/I/51aB7hrGRRL._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Apple 2023 MacBook Pro Laptop M3', price: 169900, img: 'https://m.media-amazon.com/images/I/616p9S7G8AC._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Kindle Paperwhite (16 GB)', price: 13999, img: 'https://m.media-amazon.com/images/I/71X8InX96ML._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Echo Dot (5th Gen) with Alexa', price: 4999, img: 'https://m.media-amazon.com/images/I/81S8A69W4dL._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Fire TV Stick with Alexa Voice Remote', price: 3999, img: 'https://m.media-amazon.com/images/I/51H24ARSejL._AC_UY327_FMwebp_QL65_.jpg' },
        { name: 'Logitech G502 Hero Gaming Mouse', price: 4295, img: 'https://m.media-amazon.com/images/I/51IOY99v96L._AC_UY327_FMwebp_QL65_.jpg' }
    ];

    let cart = JSON.parse(localStorage.getItem('amazon_cart')) || [];
    let orders = JSON.parse(localStorage.getItem('amazon_orders')) || [];

    function renderProducts(filter = "") {
        const grid = document.getElementById('allProducts');
        grid.innerHTML = '';
        const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
        
        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <div class="price"><span>₹</span>${p.price.toLocaleString()}</div>
                <img class="prime-img" src="https://m.media-amazon.com/images/G/31/marketing/fba/fba-badge_18x45._CB485936079_.png">
                <button class="add-btn" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
            `;
            grid.appendChild(card);
        });
    }

    function searchProducts() {
        const term = document.getElementById('searchInput').value;
        renderProducts(term);
    }

    function addToCart(p) {
        const found = cart.find(item => item.name === p.name);
        if (found) { found.qty++; } else { cart.push({ ...p, qty: 1 }); }
        updateCart();
        showToast();
    }

    function updateCart() {
        const cartItems = document.getElementById('cartItems');
        cartItems.innerHTML = '';
        let total = 0, count = 0;

        cart.forEach((item, i) => {
            total += item.price * item.qty;
            count += item.qty;
            cartItems.innerHTML += `
                <div style="display:flex; gap:10px; margin-bottom:15px; font-size:14px;">
                    <img src="${item.img}" style="width:50px; height:50px; object-fit:contain;">
                    <div>
                        <p>${item.name}</p>
                        <strong>₹${item.price}</strong>
                        <div>Qty: ${item.qty} <span onclick="removeItem(${i})" style="color:blue; cursor:pointer; margin-left:10px;">Delete</span></div>
                    </div>
                </div>
            `;
        });

        document.getElementById('total').textContent = total.toLocaleString();
        document.getElementById('count').textContent = count;
        localStorage.setItem('amazon_cart', JSON.stringify(cart));
    }

    function removeItem(i) { cart.splice(i, 1); updateCart(); }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        if(pageId === 'orderHistory') renderOrders();
    }

    function openCheckout() {
        if (cart.length === 0) return alert("Cart is empty!");
        document.getElementById('checkoutModal').style.display = 'block';
    }

    function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }

    function placeOrder() {
        const name = document.getElementById('fullName').value;
        if (!name) return alert("Please enter name");
        
        orders.push({ items: [...cart], date: new Date().toLocaleDateString(), total: document.getElementById('total').textContent });
        cart = [];
        updateCart();
        localStorage.setItem('amazon_orders', JSON.stringify(orders));
        closeCheckout();
        alert("Order Placed Successfully!");
        showPage('home');
    }

    function renderOrders() {
        const list = document.getElementById('historyList');
        list.innerHTML = orders.length ? '' : 'No orders found.';
        orders.forEach(o => {
            list.innerHTML += `
                <div style="background:white; border:1px solid #ddd; border-radius:8px; margin-bottom:20px; overflow:hidden;">
                    <div style="background:#f0f2f2; padding:15px; display:flex; gap:30px; font-size:12px;">
                        <div>ORDER PLACED<br>${o.date}</div>
                        <div>TOTAL<br>₹${o.total}</div>
                    </div>
                    <div style="padding:15px;">
                        ${o.items.map(it => `<div>${it.name} (x${it.qty})</div>`).join('')}
                    </div>
                </div>
            `;
        });
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // Initialize
    renderProducts();
    updateCart();
</script>

</body>
</html>
